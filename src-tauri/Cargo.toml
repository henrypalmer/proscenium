[package]
name = "proscenium"
version = "0.1.0"
description = "Cross-platform desktop IPTV client"
edition = "2021"

[lib]
name = "proscenium_lib"
crate-type = ["lib"]
# The lib test harness links the full GUI stack but (unlike targets under
# tests/) gets no Common-Controls manifest from build.rs, so it cannot load
# on Windows. All tests live in tests/; there are no unit tests to lose.
test = false
doctest = false

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "time"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "gzip", "rustls-tls"] }
uuid = { version = "1", features = ["v4"] }
keyring = { version = "3", features = ["windows-native", "apple-native"] }
